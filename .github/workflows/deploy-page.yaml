name: deploy-github-page

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for more commits (Debounce)
        if: github.event_name == 'push'
        run: sleep 3

      - name: Free up disk space for Nix
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'rampage'
          witness-carnage: true
          root-safe-haven: 20480
          mnt-safe-haven: 512

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            build-dir = /nix/build

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Install devenv
        run: nix profile install nixpkgs#devenv

      - name: Check disk space before build
        run: df -h

      - name: Build Release
        run: |
          (while true; do
            echo "=== $(date -u) ==="
            free -h
            df -h /
            df -h /nix
            echo "---"
            sleep 120
          done) &
          MEMMON_PID=$!

          devenv --profile web --clean --refresh-eval-cache shell -- \
            trunk build --release --cargo-profile web-release --verbose 2>&1

          kill $MEMMON_PID || true
        env:
          CARGO_BUILD_JOBS: 1
          CARGO_TARGET_DIR: /nix/build/cargo-target

      - name: Optimize Wasm
        run: |
          devenv --profile web shell -- bash -c '
            for f in dist/*.wasm; do
              echo "Optimizing $f..."
              wasm-opt -Oz \
                --enable-bulk-memory \
                --enable-nontrapping-float-to-int \
                --enable-threads \
                -o "$f" "$f" || echo "wasm-opt failed for $f, skipping"
            done
          '

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.2.5
        with:
          branch: gh-pages
          folder: dist