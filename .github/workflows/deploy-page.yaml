name: deploy-github-page

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for more commits (Debounce)
        if: github.event_name == 'push'
        run: sleep 3

      - name: Add swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Free up disk space for Nix
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'rampage'
          witness-carnage: true

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            build-dir = /nix/build

      # Replaces cache-nix-action — no tarballs staged on root, daemon-based
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Install devenv
        run: nix profile install nixpkgs#devenv

      - name: Check disk space before build
        run: |
          df -h
          du -sh ~/.cargo /nix 2>/dev/null || true

      - name: Build Release
        run: |
          (while true; do
            echo "=== $(date -u) ==="
            free -h
            df -h /
            echo "---"
            sleep 120
          done) &
          MEMMON_PID=$!

          nix develop --command devenv shell -- \
            trunk build --release --cargo-profile web-release --verbose 2>&1

          kill $MEMMON_PID || true
        env:
          CARGO_BUILD_JOBS: 1

      - name: Optimize Wasm
        uses: NiklasEi/wasm-opt-action@v2
        with:
          file: dist/*.wasm

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.2.5
        with:
          branch: gh-pages
          folder: dist