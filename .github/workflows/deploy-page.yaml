name: deploy-github-page

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for more commits (Debounce)
        if: github.event_name == 'push'
        run: sleep 3

      # Swap FIRST, before anything touches the disk
      - name: Add swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      # Synchronous purge — waits for full space reclaim before continuing
      - name: Free up disk space for Nix
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'rampage'
          witness-carnage: true

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            build-dir = /nix/build

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'devenv.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 4G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-last-accessed: 604800

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-

      - name: Install devenv
        run: nix profile install nixpkgs#devenv

      - name: Build Release
        run: |
          # Print memory/swap every 2 minutes in the background
          (while true; do
            echo "=== $(date -u) ==="
            free -h
            swapon --show
            df -h /
            echo "---"
            sleep 120
          done) &
          MEMMON_PID=$!

          nix develop --command devenv shell -- \
            trunk build --release --cargo-profile web-release --verbose 2>&1

          kill $MEMMON_PID || true
        env:
          CARGO_BUILD_JOBS: 1

      - name: Optimize Wasm
        uses: NiklasEi/wasm-opt-action@v2
        with:
          file: dist/*.wasm

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.2.5
        with:
          branch: gh-pages
          folder: dist